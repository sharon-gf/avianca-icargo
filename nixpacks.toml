[variables]
NIXPACKS_METADATA = "python"
NIXPACKS_PYTHON_VERSION = "3.10"
PYTHONUNBUFFERED = "1"

[phases.setup]
nixPkgs = [
    "python310",
    "chromium",
    "chromedriver",
    "gcc",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python app.py"

[build]
onlyIncludeFiles = [
    "app.py",
    "tariff_downloader.py",
    "requirements.txt",
    "templates/",
    "Procfile",
    "runtime.txt",
    "railway.toml",
    "nixpacks.toml",
]
