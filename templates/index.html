<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avianca TRF007 Downloader</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #eef2f6;
            color: #172033;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 18px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .subtitle {
            color: #5b667a;
            font-size: 14px;
            margin-top: 4px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(20, 35, 60, 0.08);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .conditional-panel {
            display: none;
        }

        .conditional-panel.active {
            display: block;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .flight-grid {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr);
            gap: 8px;
        }

        .checkbox-option {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #303c50;
            cursor: pointer;
            font-size: 13px;
            font-weight: 650;
            margin: 0;
        }

        .checkbox-option input {
            width: 15px;
            height: 15px;
            accent-color: #b4172a;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 650;
            margin-bottom: 8px;
        }

        select,
        input[type="date"],
        input[type="text"] {
            width: 100%;
            min-height: 40px;
            border: 1px solid #cbd3df;
            border-radius: 6px;
            background: #ffffff;
            color: #172033;
            font: inherit;
            font-size: 14px;
            padding: 8px 10px;
        }

        select:focus,
        input[type="date"]:focus,
        input[type="text"]:focus {
            border-color: #1b66d2;
            box-shadow: 0 0 0 3px rgba(27, 102, 210, 0.14);
            outline: none;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        button {
            min-height: 38px;
            border: 1px solid #b9c4d3;
            border-radius: 6px;
            background: #ffffff;
            color: #172033;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 650;
            padding: 8px 12px;
        }

        button:hover:not(:disabled) {
            background: #f4f7fb;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .primary-btn {
            width: 100%;
            min-height: 46px;
            background: #b4172a;
            border-color: #b4172a;
            color: #ffffff;
        }

        .primary-btn:hover:not(:disabled) {
            background: #941323;
        }

        .secondary-btn {
            width: 100%;
            min-height: 46px;
            background: #ffffff;
            border-color: #b4172a;
            color: #9d1e2d;
        }

        .secondary-btn:hover:not(:disabled) {
            background: #fff4f5;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 42px;
            border-radius: 6px;
            background: #1f7a4d;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .danger-btn {
            width: 100%;
            min-height: 42px;
            background: #ffffff;
            border-color: #c74c59;
            color: #9d1e2d;
            margin-bottom: 12px;
        }

        .danger-btn:hover:not(:disabled) {
            background: #fff0f1;
        }

        .debug-links {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }

        .debug-link {
            color: #1b66d2;
            font-size: 12px;
            font-weight: 650;
            line-height: 1.35;
            text-decoration: none;
        }

        .debug-link:hover {
            text-decoration: underline;
        }

        .airports-grid {
            display: grid;
            gap: 12px;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            background: #f8fafc;
            padding: 12px;
        }

        .country-group {
            display: grid;
            gap: 8px;
        }

        .country-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: #172033;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .country-title label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin: 0;
            cursor: pointer;
            font-size: inherit;
            font-weight: inherit;
        }

        .country-title input {
            width: 15px;
            height: 15px;
            accent-color: #b4172a;
        }

        .country-airports {
            display: grid;
            grid-template-columns: repeat(auto-fill, 72px);
            gap: 8px;
            justify-content: start;
            border-bottom: 1px solid #e3e8f0;
            padding-bottom: 10px;
        }

        .country-group:last-child .country-airports {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .airport-label {
            display: flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            color: #283449;
            cursor: pointer;
            font-size: 13px;
            font-weight: 400;
            user-select: none;
        }

        .airport-label input {
            width: 15px;
            height: 15px;
            accent-color: #b4172a;
        }

        .selected-count {
            margin-top: 8px;
            color: #5b667a;
            font-size: 13px;
        }

        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field-caption {
            color: #5b667a;
            font-size: 12px;
            font-weight: 650;
            margin-bottom: 5px;
        }

        .status {
            display: none;
            margin-top: 14px;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 13px;
            line-height: 1.4;
        }

        .status.info {
            display: block;
            background: #e8f1ff;
            border: 1px solid #bed5fb;
            color: #16427d;
        }

        .status.error {
            display: block;
            background: #fff0f1;
            border: 1px solid #f0bac0;
            color: #8c1020;
        }

        .status.success {
            display: block;
            background: #eaf7ef;
            border: 1px solid #b8dec7;
            color: #1c5d3b;
        }

        .job-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .job-title h2 {
            font-size: 16px;
            letter-spacing: 0;
        }

        .badge {
            border-radius: 999px;
            background: #edf1f6;
            color: #4b5870;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 9px;
            text-transform: uppercase;
        }

        .progress-track {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: #e1e7f0;
            margin-bottom: 12px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #b4172a;
            transition: width 0.3s ease;
        }

        .job-meta {
            color: #5b667a;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .log-list {
            display: grid;
            gap: 7px;
            max-height: 320px;
            overflow-y: auto;
            border-top: 1px solid #e2e7ef;
            padding-top: 12px;
        }

        .log-item {
            display: grid;
            grid-template-columns: 58px 1fr;
            gap: 8px;
            color: #303c50;
            font-size: 12px;
            line-height: 1.35;
        }

        .log-time {
            color: #7a8597;
            font-variant-numeric: tabular-nums;
        }

        .empty-state {
            color: #7a8597;
            font-size: 13px;
            line-height: 1.5;
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .date-grid {
                grid-template-columns: 1fr;
            }

            .input-grid,
            .flight-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <h1>Avianca iCargo Downloader</h1>
            <p class="subtitle">TRF007 tariffs and CAP142 booking exports</p>
        </header>

        <div class="layout">
            <section class="panel">
                <div class="form-group">
                    <label for="module">Module</label>
                    <select id="module">
                        <option value="TRF007">TRF007 - Tariff/Rate Requests</option>
                        <option value="CAP142">CAP142 - Booking Data</option>
                    </select>
                </div>

                <div class="conditional-panel" id="cap142Panel">
                    <div class="form-group">
                        <label for="cap142Mode">CAP142 download type</label>
                        <select id="cap142Mode">
                            <option value="booking_period">Booking date period</option>
                            <option value="specific_flight">Specific flight</option>
                        </select>
                    </div>

                    <div class="form-group" id="awbPrefixGroup">
                        <label for="awbPrefix">AWB prefix</label>
                        <input type="text" id="awbPrefix" value="729" inputmode="numeric">
                    </div>

                    <div class="form-group conditional-panel" id="flightFields">
                        <label>Flight number</label>
                        <div class="flight-grid">
                            <input type="text" id="flightCarrier" value="QT" maxlength="2">
                            <input type="text" id="flightNumber" inputmode="numeric" placeholder="4043">
                        </div>
                    </div>

                </div>

                <div class="form-group">
                    <label id="originsLabel">Airports</label>
                    <div class="button-row">
                        <button type="button" id="selectAllBtn">Select all</button>
                        <button type="button" id="clearBtn">Clear</button>
                    </div>
                    <div class="airports-grid" id="airportsGrid"></div>
                    <div class="selected-count"><span id="selectedCount">0</span> <span id="selectedSuffix">selected</span></div>
                </div>

                <div class="form-group">
                    <label id="dateRangeLabel">Date range</label>
                    <div class="date-grid">
                        <div>
                            <div class="field-caption" id="startDateCaption">From</div>
                            <input type="date" id="startDate">
                        </div>
                        <div>
                            <div class="field-caption" id="endDateCaption">To</div>
                            <input type="date" id="endDate">
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="primary-btn" id="downloadBtn">Download</button>
                    <button type="button" class="secondary-btn" id="compareBtn">Download and compare</button>
                </div>
                <div id="statusMessage" class="status"></div>
            </section>

            <aside class="panel">
                <div class="job-title">
                    <h2>Job Status</h2>
                    <span class="badge" id="jobBadge">Idle</span>
                </div>
                <div class="progress-track" aria-hidden="true">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="job-meta" id="jobMeta">No active job.</div>
                <div id="jobActions"></div>
                <div class="log-list" id="logList">
                    <div class="empty-state">Progress messages will appear here after a job starts.</div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const AIRPORT_GROUPS = [
            { country: "China", airports: ["CAN", "CGO", "PEK", "PVG", "SZX", "XMN"] },
            { country: "Hong Kong", airports: ["HKG"] },
            { country: "Indonesia", airports: ["CGK", "DPS"] },
            { country: "Japan", airports: ["HND", "KIX", "NGO", "NRT"] },
            { country: "Macau", airports: ["MFM"] },
            { country: "Pakistan", airports: ["ISB", "KHI", "LHE"] },
            { country: "South Korea", airports: ["GMP", "ICN"] },
            { country: "Taiwan", airports: ["TPE"] },
            { country: "Vietnam", airports: ["DAD", "HAN", "SGN"] },
            { country: "United States", airports: ["MIA"] }
        ];
        const MAX_RANGE_DAYS = 15;
        const logTimeFormatter = new Intl.DateTimeFormat([], {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
        });

        let pollTimer = null;
        let activeJobId = null;
        let autoDownloadStarted = false;
        let lastModeKey = "";

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function toInputDate(date) {
            return date.toISOString().slice(0, 10);
        }

        function initDates() {
            const today = new Date();
            document.getElementById("startDate").value = toInputDate(today);
            document.getElementById("endDate").value = toInputDate(addDays(today, MAX_RANGE_DAYS));
            syncDateLimits();
        }

        function syncDateLimits() {
            const startInput = document.getElementById("startDate");
            const endInput = document.getElementById("endDate");
            if (!startInput.value) return;

            const startDate = new Date(startInput.value + "T00:00:00");
            endInput.min = startInput.value;
            endInput.max = toInputDate(addDays(startDate, MAX_RANGE_DAYS));

            if (currentModule() === "CAP142" && currentCap142Mode() === "specific_flight") {
                endInput.value = startInput.value;
                return;
            }

            if (endInput.value < endInput.min || endInput.value > endInput.max) {
                endInput.value = endInput.max;
            }
        }

        function initAirports() {
            const grid = document.getElementById("airportsGrid");
            AIRPORT_GROUPS.forEach((group, groupIndex) => {
                const section = document.createElement("section");
                section.className = "country-group";
                section.innerHTML = `
                    <div class="country-title">
                        <label>
                            <input type="checkbox" class="country-checkbox" data-group-index="${groupIndex}" checked>
                            <span>${group.country}</span>
                        </label>
                    </div>
                    <div class="country-airports"></div>
                `;

                const countryAirports = section.querySelector(".country-airports");
                group.airports.forEach((airport) => {
                    const label = document.createElement("label");
                    label.className = "airport-label";
                    label.innerHTML = `
                        <input type="checkbox" class="airport-checkbox" value="${airport}" data-group-index="${groupIndex}" checked>
                        <span>${airport}</span>
                    `;
                    countryAirports.appendChild(label);
                });
                grid.appendChild(section);
            });

            document.querySelectorAll(".airport-checkbox").forEach((checkbox) => {
                checkbox.addEventListener("change", () => {
                    syncCountryCheckbox(Number(checkbox.dataset.groupIndex));
                    updateSelectedCount();
                });
            });

            document.querySelectorAll(".country-checkbox").forEach((checkbox) => {
                checkbox.addEventListener("change", () => {
                    const groupIndex = Number(checkbox.dataset.groupIndex);
                    document.querySelectorAll(`.airport-checkbox[data-group-index="${groupIndex}"]`).forEach((airportCheckbox) => {
                        airportCheckbox.checked = checkbox.checked;
                    });
                    updateSelectedCount();
                });
            });
            updateSelectedCount();
        }

        function syncCountryCheckbox(groupIndex) {
            const countryCheckbox = document.querySelector(`.country-checkbox[data-group-index="${groupIndex}"]`);
            const airportCheckboxes = Array.from(document.querySelectorAll(`.airport-checkbox[data-group-index="${groupIndex}"]`));
            const checkedCount = airportCheckboxes.filter((checkbox) => checkbox.checked).length;
            countryCheckbox.checked = checkedCount === airportCheckboxes.length;
            countryCheckbox.indeterminate = checkedCount > 0 && checkedCount < airportCheckboxes.length;
        }

        function syncAllCountryCheckboxes() {
            AIRPORT_GROUPS.forEach((_, groupIndex) => syncCountryCheckbox(groupIndex));
        }

        function updateSelectedCount() {
            const selected = document.querySelectorAll(".airport-checkbox:checked").length;
            const selectedCount = document.getElementById("selectedCount");
            const selectedSuffix = document.getElementById("selectedSuffix");
            if (currentModule() === "CAP142" && currentCap142Mode() === "specific_flight" && selected === 0) {
                selectedCount.textContent = "Origin";
                selectedSuffix.textContent = "blank";
                return;
            }
            selectedCount.textContent = selected;
            selectedSuffix.textContent = selected === 1 ? "selected" : "selected";
        }

        function selectedAirports() {
            return Array.from(document.querySelectorAll(".airport-checkbox:checked")).map((checkbox) => checkbox.value);
        }

        function currentModule() {
            return document.getElementById("module").value;
        }

        function currentCap142Mode() {
            return document.getElementById("cap142Mode").value;
        }

        function updateModuleView() {
            const module = currentModule();
            const cap142Mode = currentCap142Mode();
            const isCap142 = module === "CAP142";
            const isSpecificFlight = isCap142 && cap142Mode === "specific_flight";
            const modeKey = `${module}:${cap142Mode}`;
            const enteringSpecificFlight = modeKey === "CAP142:specific_flight" && lastModeKey !== modeKey;

            document.getElementById("cap142Panel").classList.toggle("active", isCap142);
            document.getElementById("flightFields").classList.toggle("active", isSpecificFlight);
            document.getElementById("awbPrefixGroup").style.display = isCap142 && !isSpecificFlight ? "block" : "none";
            document.getElementById("originsLabel").textContent = isSpecificFlight ? "Origins (optional)" : (isCap142 ? "Origins" : "Airports");
            document.getElementById("dateRangeLabel").textContent = isSpecificFlight ? "Flight date" : (isCap142 ? "Booking date range" : "Date range");
            document.getElementById("startDateCaption").textContent = isSpecificFlight ? "Flight date from" : "From";
            document.getElementById("endDateCaption").textContent = isSpecificFlight ? "Flight date to" : "To";

            if (isSpecificFlight) {
                document.getElementById("awbPrefix").value = "";
                document.getElementById("endDate").value = document.getElementById("startDate").value;
                if (enteringSpecificFlight) {
                    document.querySelectorAll(".airport-checkbox, .country-checkbox").forEach((checkbox) => {
                        checkbox.checked = false;
                        checkbox.indeterminate = false;
                    });
                }
            } else if (isCap142 && !document.getElementById("awbPrefix").value.trim()) {
                document.getElementById("awbPrefix").value = "729";
            }
            lastModeKey = modeKey;
            syncAllCountryCheckboxes();
            updateSelectedCount();
        }

        function setBusy(isBusy) {
            document.getElementById("downloadBtn").disabled = isBusy;
            document.getElementById("compareBtn").disabled = isBusy;
            document.querySelectorAll("input, select, #selectAllBtn, #clearBtn").forEach((element) => {
                element.disabled = isBusy;
            });
        }

        function showStatus(message, type) {
            const element = document.getElementById("statusMessage");
            element.textContent = message;
            element.className = `status ${type}`;
        }

        function clearStatus() {
            const element = document.getElementById("statusMessage");
            element.textContent = "";
            element.className = "status";
        }

        async function startDownload(compareWithSystem = false) {
            if (window.location.protocol === "file:") {
                showStatus("Open the Railway URL or local Flask URL, not the raw HTML file.", "error");
                return;
            }

            const airports = selectedAirports();
            const module = currentModule();
            const payload = {
                module,
                airports,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                compareWithSystem
            };

            if (compareWithSystem && !(module === "CAP142" && currentCap142Mode() === "specific_flight")) {
                showStatus("Download and compare is only available for CAP142 specific flight for now.", "error");
                return;
            }

            const isOptionalOriginSpecificFlight = module === "CAP142" && currentCap142Mode() === "specific_flight";
            if (!airports.length && !isOptionalOriginSpecificFlight) {
                showStatus("Select at least one origin.", "error");
                return;
            }

            if (module === "CAP142") {
                payload.cap142Mode = currentCap142Mode();
                payload.awbPrefix = payload.cap142Mode === "specific_flight" ? "" : document.getElementById("awbPrefix").value;
                payload.originType = "Airport";

                if (payload.cap142Mode === "specific_flight") {
                    payload.flightCarrier = document.getElementById("flightCarrier").value;
                    payload.flightNumber = document.getElementById("flightNumber").value;

                    if (airports.length > 1) {
                        showStatus("Choose one origin, or clear origins to leave the origin field blank.", "error");
                        return;
                    }
                    if (!payload.flightNumber.trim()) {
                        showStatus("Enter a flight number.", "error");
                        return;
                    }
                } else {
                    payload.flightCarrier = "";
                    payload.flightNumber = "";
                }
            }

            setBusy(true);
            clearStatus();
            autoDownloadStarted = false;
            renderJobSkeleton("Starting");

            try {
                const response = await fetch("/api/download", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Client-Version": "job-api-v2"
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (!response.ok) {
                    if (response.status === 409 && data.activeJob) {
                        activeJobId = data.activeJob.id;
                        renderJob(data.activeJob);
                        beginPolling(activeJobId);
                    }
                    throw new Error(data.error || "Download could not start");
                }

                activeJobId = data.id;
                renderJob(data);
                beginPolling(activeJobId);
                showStatus(compareWithSystem ? "Download and compare job started." : "Download job started.", "info");
            } catch (error) {
                showStatus(error.message, "error");
                if (!activeJobId) {
                    setBusy(false);
                    renderIdle();
                }
            }
        }

        async function abortJob() {
            if (!activeJobId) return;

            const button = document.getElementById("abortBtn");
            if (button) {
                button.disabled = true;
                button.textContent = "Aborting...";
            }
            showStatus("Abort requested. The browser job will stop at the next safe checkpoint.", "info");

            try {
                const response = await fetch(`/api/jobs/${activeJobId}/cancel`, {
                    method: "POST",
                    headers: { "X-Client-Version": "job-api-v2" }
                });
                const job = await response.json();
                if (!response.ok) {
                    throw new Error(job.error || "Could not abort job");
                }
                renderJob(job);
                beginPolling(activeJobId);
            } catch (error) {
                showStatus(error.message, "error");
            }
        }

        function beginPolling(jobId) {
            if (pollTimer) {
                clearInterval(pollTimer);
            }
            pollTimer = setInterval(() => pollJob(jobId), 3000);
            pollJob(jobId);
        }

        async function pollJob(jobId) {
            try {
                const response = await fetch(`/api/jobs/${jobId}`);
                const job = await response.json();
                if (!response.ok) {
                    throw new Error(job.error || "Could not load job");
                }
                renderJob(job);

                if (job.status === "completed") {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    setBusy(false);
                    showStatus("Merged file is ready.", "success");
                    if (!autoDownloadStarted && job.downloadUrl) {
                        autoDownloadStarted = true;
                        window.location.href = job.downloadUrl;
                    }
                }

                if (job.status === "failed") {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    setBusy(false);
                    showStatus(job.error || "Download failed.", "error");
                }

                if (job.status === "cancelled") {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    setBusy(false);
                    showStatus("Download cancelled.", "info");
                }
            } catch (error) {
                clearInterval(pollTimer);
                pollTimer = null;
                setBusy(false);
                showStatus(error.message, "error");
            }
        }

        function renderJobSkeleton(status) {
            document.getElementById("jobBadge").textContent = status;
            document.getElementById("progressFill").style.width = "0%";
            document.getElementById("jobMeta").textContent = "Creating job...";
            document.getElementById("jobActions").innerHTML = "";
            document.getElementById("logList").innerHTML = '<div class="empty-state">Waiting for first progress message.</div>';
        }

        function renderIdle() {
            document.getElementById("jobBadge").textContent = "Idle";
            document.getElementById("progressFill").style.width = "0%";
            document.getElementById("jobMeta").textContent = "No active job.";
            document.getElementById("jobActions").innerHTML = "";
            document.getElementById("logList").innerHTML = '<div class="empty-state">Progress messages will appear here after a job starts.</div>';
        }

        function renderJob(job) {
            const progress = job.progress || 0;
            const unit = job.module === "CAP142" ? "origins" : "airports";
            const isSpecificFlightAllOrigins =
                job.module === "CAP142" &&
                job.cap142Options &&
                job.cap142Options.cap142_mode === "specific_flight" &&
                job.airports.length === 0;
            const originSummary = isSpecificFlightAllOrigins ? "origin blank" : `${job.airports.length} ${unit}`;
            document.getElementById("jobBadge").textContent = job.status;
            document.getElementById("progressFill").style.width = `${progress}%`;
            document.getElementById("jobMeta").textContent =
                `${originSummary} | ${job.startDate} to ${job.endDate} | ${progress}%`;

            let actionsHtml = "";
            if (job.status === "completed" && job.downloadUrl) {
                actionsHtml = `<a class="download-link" href="${job.downloadUrl}">Download Excel file</a>`;
            } else if (["queued", "running", "cancelling"].includes(job.status)) {
                const disabled = job.status === "cancelling" ? "disabled" : "";
                const label = job.status === "cancelling" ? "Aborting..." : "Abort job";
                actionsHtml = `<button type="button" class="danger-btn" id="abortBtn" ${disabled}>${label}</button>`;
            }

            if (job.debugFiles && job.debugFiles.length) {
                actionsHtml += `
                    <div class="debug-links">
                        ${job.debugFiles.map((file) => `
                            <a class="debug-link" href="${file.url}" target="_blank" rel="noopener">
                                Debug: ${escapeHtml(file.name)}
                            </a>
                        `).join("")}
                    </div>
                `;
            }

            document.getElementById("jobActions").innerHTML = actionsHtml;
            const abortButton = document.getElementById("abortBtn");
            if (abortButton) {
                abortButton.addEventListener("click", abortJob);
            }

            const logList = document.getElementById("logList");
            if (!job.logs || !job.logs.length) {
                logList.innerHTML = '<div class="empty-state">Waiting for first progress message.</div>';
                return;
            }

            logList.innerHTML = job.logs.map((entry) => `
                <div class="log-item">
                    <span class="log-time">${formatLogTime(entry)}</span>
                    <span>${escapeHtml(entry.message)}</span>
                </div>
            `).join("");
            logList.scrollTop = logList.scrollHeight;
        }

        function formatLogTime(entry) {
            if (!entry.timeUtc) {
                return entry.time || "";
            }

            const date = new Date(entry.timeUtc);
            if (Number.isNaN(date.getTime())) {
                return entry.time || "";
            }
            return logTimeFormatter.format(date);
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        document.getElementById("selectAllBtn").addEventListener("click", () => {
            document.querySelectorAll(".airport-checkbox").forEach((checkbox) => {
                checkbox.checked = true;
            });
            syncAllCountryCheckboxes();
            updateSelectedCount();
        });

        document.getElementById("clearBtn").addEventListener("click", () => {
            document.querySelectorAll(".airport-checkbox").forEach((checkbox) => {
                checkbox.checked = false;
            });
            syncAllCountryCheckboxes();
            updateSelectedCount();
        });

        document.getElementById("startDate").addEventListener("change", syncDateLimits);
        document.getElementById("module").addEventListener("change", updateModuleView);
        document.getElementById("cap142Mode").addEventListener("change", updateModuleView);
        document.getElementById("downloadBtn").addEventListener("click", () => startDownload(false));
        document.getElementById("compareBtn").addEventListener("click", () => startDownload(true));

        initDates();
        initAirports();
        updateModuleView();
        if (window.location.protocol === "file:") {
            showStatus("This is the raw HTML file. Open the Railway URL to run downloads.", "error");
            document.getElementById("downloadBtn").disabled = true;
            document.getElementById("compareBtn").disabled = true;
        }
    </script>
</body>
</html>
