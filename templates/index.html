<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avianca TRF007 Downloader</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #eef2f6;
            color: #172033;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 18px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .subtitle {
            color: #5b667a;
            font-size: 14px;
            margin-top: 4px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(20, 35, 60, 0.08);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 650;
            margin-bottom: 8px;
        }

        select,
        input[type="date"] {
            width: 100%;
            min-height: 40px;
            border: 1px solid #cbd3df;
            border-radius: 6px;
            background: #ffffff;
            color: #172033;
            font: inherit;
            font-size: 14px;
            padding: 8px 10px;
        }

        select:focus,
        input[type="date"]:focus {
            border-color: #1b66d2;
            box-shadow: 0 0 0 3px rgba(27, 102, 210, 0.14);
            outline: none;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        button {
            min-height: 38px;
            border: 1px solid #b9c4d3;
            border-radius: 6px;
            background: #ffffff;
            color: #172033;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 650;
            padding: 8px 12px;
        }

        button:hover:not(:disabled) {
            background: #f4f7fb;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .primary-btn {
            width: 100%;
            min-height: 46px;
            background: #b4172a;
            border-color: #b4172a;
            color: #ffffff;
        }

        .primary-btn:hover:not(:disabled) {
            background: #941323;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 42px;
            border-radius: 6px;
            background: #1f7a4d;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .airports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            background: #f8fafc;
            padding: 12px;
        }

        .airport-label {
            display: flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            color: #283449;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            user-select: none;
        }

        .airport-label input {
            width: 15px;
            height: 15px;
            accent-color: #b4172a;
        }

        .selected-count {
            margin-top: 8px;
            color: #5b667a;
            font-size: 13px;
        }

        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field-caption {
            color: #5b667a;
            font-size: 12px;
            font-weight: 650;
            margin-bottom: 5px;
        }

        .status {
            display: none;
            margin-top: 14px;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 13px;
            line-height: 1.4;
        }

        .status.info {
            display: block;
            background: #e8f1ff;
            border: 1px solid #bed5fb;
            color: #16427d;
        }

        .status.error {
            display: block;
            background: #fff0f1;
            border: 1px solid #f0bac0;
            color: #8c1020;
        }

        .status.success {
            display: block;
            background: #eaf7ef;
            border: 1px solid #b8dec7;
            color: #1c5d3b;
        }

        .job-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .job-title h2 {
            font-size: 16px;
            letter-spacing: 0;
        }

        .badge {
            border-radius: 999px;
            background: #edf1f6;
            color: #4b5870;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 9px;
            text-transform: uppercase;
        }

        .progress-track {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: #e1e7f0;
            margin-bottom: 12px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #b4172a;
            transition: width 0.3s ease;
        }

        .job-meta {
            color: #5b667a;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .log-list {
            display: grid;
            gap: 7px;
            max-height: 320px;
            overflow-y: auto;
            border-top: 1px solid #e2e7ef;
            padding-top: 12px;
        }

        .log-item {
            display: grid;
            grid-template-columns: 58px 1fr;
            gap: 8px;
            color: #303c50;
            font-size: 12px;
            line-height: 1.35;
        }

        .log-time {
            color: #7a8597;
            font-variant-numeric: tabular-nums;
        }

        .empty-state {
            color: #7a8597;
            font-size: 13px;
            line-height: 1.5;
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .date-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <h1>Avianca TRF007 Downloader</h1>
            <p class="subtitle">Tariff exports for selected origin airports</p>
        </header>

        <div class="layout">
            <section class="panel">
                <div class="form-group">
                    <label for="module">Module</label>
                    <select id="module">
                        <option value="TRF007">TRF007 - Tariff/Rate Requests</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Airports</label>
                    <div class="button-row">
                        <button type="button" id="selectAllBtn">Select all</button>
                        <button type="button" id="clearBtn">Clear</button>
                    </div>
                    <div class="airports-grid" id="airportsGrid"></div>
                    <div class="selected-count"><span id="selectedCount">0</span> selected</div>
                </div>

                <div class="form-group">
                    <label>Date range</label>
                    <div class="date-grid">
                        <div>
                            <div class="field-caption">From</div>
                            <input type="date" id="startDate">
                        </div>
                        <div>
                            <div class="field-caption">To</div>
                            <input type="date" id="endDate">
                        </div>
                    </div>
                </div>

                <button type="button" class="primary-btn" id="downloadBtn">Start download</button>
                <div id="statusMessage" class="status"></div>
            </section>

            <aside class="panel">
                <div class="job-title">
                    <h2>Job Status</h2>
                    <span class="badge" id="jobBadge">Idle</span>
                </div>
                <div class="progress-track" aria-hidden="true">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="job-meta" id="jobMeta">No active job.</div>
                <div id="downloadArea"></div>
                <div class="log-list" id="logList">
                    <div class="empty-state">Progress messages will appear here after a job starts.</div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const AIRPORTS = [
            "CAN", "HKG", "NGO", "ISB", "XMN", "CGK", "ICN", "TPE",
            "CGO", "DPS", "GMP", "HAN", "PEK", "NRT", "MFM", "SGN",
            "PVG", "HND", "KHI", "DAD", "SZX", "KIX", "LHE"
        ];
        const MAX_RANGE_DAYS = 15;

        let pollTimer = null;
        let activeJobId = null;
        let autoDownloadStarted = false;

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function toInputDate(date) {
            return date.toISOString().slice(0, 10);
        }

        function initDates() {
            const today = new Date();
            document.getElementById("startDate").value = toInputDate(today);
            document.getElementById("endDate").value = toInputDate(addDays(today, MAX_RANGE_DAYS));
            syncDateLimits();
        }

        function syncDateLimits() {
            const startInput = document.getElementById("startDate");
            const endInput = document.getElementById("endDate");
            if (!startInput.value) return;

            const startDate = new Date(startInput.value + "T00:00:00");
            endInput.min = startInput.value;
            endInput.max = toInputDate(addDays(startDate, MAX_RANGE_DAYS));

            if (endInput.value < endInput.min || endInput.value > endInput.max) {
                endInput.value = endInput.max;
            }
        }

        function initAirports() {
            const grid = document.getElementById("airportsGrid");
            AIRPORTS.forEach((airport) => {
                const label = document.createElement("label");
                label.className = "airport-label";
                label.innerHTML = `
                    <input type="checkbox" class="airport-checkbox" value="${airport}" checked>
                    <span>${airport}</span>
                `;
                grid.appendChild(label);
            });

            document.querySelectorAll(".airport-checkbox").forEach((checkbox) => {
                checkbox.addEventListener("change", updateSelectedCount);
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const selected = document.querySelectorAll(".airport-checkbox:checked").length;
            document.getElementById("selectedCount").textContent = selected;
        }

        function selectedAirports() {
            return Array.from(document.querySelectorAll(".airport-checkbox:checked")).map((checkbox) => checkbox.value);
        }

        function setBusy(isBusy) {
            document.getElementById("downloadBtn").disabled = isBusy;
            document.querySelectorAll("input, select, #selectAllBtn, #clearBtn").forEach((element) => {
                element.disabled = isBusy;
            });
        }

        function showStatus(message, type) {
            const element = document.getElementById("statusMessage");
            element.textContent = message;
            element.className = `status ${type}`;
        }

        function clearStatus() {
            const element = document.getElementById("statusMessage");
            element.textContent = "";
            element.className = "status";
        }

        async function startDownload() {
            const airports = selectedAirports();
            const payload = {
                module: document.getElementById("module").value,
                airports,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value
            };

            if (!airports.length) {
                showStatus("Select at least one airport.", "error");
                return;
            }

            setBusy(true);
            clearStatus();
            autoDownloadStarted = false;
            renderJobSkeleton("Starting");

            try {
                const response = await fetch("/api/download", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Client-Version": "job-api-v2"
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (!response.ok) {
                    if (response.status === 409 && data.activeJob) {
                        activeJobId = data.activeJob.id;
                        renderJob(data.activeJob);
                        beginPolling(activeJobId);
                    }
                    throw new Error(data.error || "Download could not start");
                }

                activeJobId = data.id;
                renderJob(data);
                beginPolling(activeJobId);
                showStatus("Download job started.", "info");
            } catch (error) {
                showStatus(error.message, "error");
                if (!activeJobId) {
                    setBusy(false);
                    renderIdle();
                }
            }
        }

        function beginPolling(jobId) {
            if (pollTimer) {
                clearInterval(pollTimer);
            }
            pollTimer = setInterval(() => pollJob(jobId), 3000);
            pollJob(jobId);
        }

        async function pollJob(jobId) {
            try {
                const response = await fetch(`/api/jobs/${jobId}`);
                const job = await response.json();
                if (!response.ok) {
                    throw new Error(job.error || "Could not load job");
                }
                renderJob(job);

                if (job.status === "completed") {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    setBusy(false);
                    showStatus("Merged file is ready.", "success");
                    if (!autoDownloadStarted && job.downloadUrl) {
                        autoDownloadStarted = true;
                        window.location.href = job.downloadUrl;
                    }
                }

                if (job.status === "failed") {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    setBusy(false);
                    showStatus(job.error || "Download failed.", "error");
                }
            } catch (error) {
                clearInterval(pollTimer);
                pollTimer = null;
                setBusy(false);
                showStatus(error.message, "error");
            }
        }

        function renderJobSkeleton(status) {
            document.getElementById("jobBadge").textContent = status;
            document.getElementById("progressFill").style.width = "0%";
            document.getElementById("jobMeta").textContent = "Creating job...";
            document.getElementById("downloadArea").innerHTML = "";
            document.getElementById("logList").innerHTML = '<div class="empty-state">Waiting for first progress message.</div>';
        }

        function renderIdle() {
            document.getElementById("jobBadge").textContent = "Idle";
            document.getElementById("progressFill").style.width = "0%";
            document.getElementById("jobMeta").textContent = "No active job.";
            document.getElementById("downloadArea").innerHTML = "";
            document.getElementById("logList").innerHTML = '<div class="empty-state">Progress messages will appear here after a job starts.</div>';
        }

        function renderJob(job) {
            const progress = job.progress || 0;
            document.getElementById("jobBadge").textContent = job.status;
            document.getElementById("progressFill").style.width = `${progress}%`;
            document.getElementById("jobMeta").textContent =
                `${job.airports.length} airports | ${job.startDate} to ${job.endDate} | ${progress}%`;

            if (job.status === "completed" && job.downloadUrl) {
                document.getElementById("downloadArea").innerHTML =
                    `<a class="download-link" href="${job.downloadUrl}">Download Excel file</a>`;
            } else {
                document.getElementById("downloadArea").innerHTML = "";
            }

            const logList = document.getElementById("logList");
            if (!job.logs || !job.logs.length) {
                logList.innerHTML = '<div class="empty-state">Waiting for first progress message.</div>';
                return;
            }

            logList.innerHTML = job.logs.map((entry) => `
                <div class="log-item">
                    <span class="log-time">${entry.time}</span>
                    <span>${escapeHtml(entry.message)}</span>
                </div>
            `).join("");
            logList.scrollTop = logList.scrollHeight;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        document.getElementById("selectAllBtn").addEventListener("click", () => {
            document.querySelectorAll(".airport-checkbox").forEach((checkbox) => {
                checkbox.checked = true;
            });
            updateSelectedCount();
        });

        document.getElementById("clearBtn").addEventListener("click", () => {
            document.querySelectorAll(".airport-checkbox").forEach((checkbox) => {
                checkbox.checked = false;
            });
            updateSelectedCount();
        });

        document.getElementById("startDate").addEventListener("change", syncDateLimits);
        document.getElementById("downloadBtn").addEventListener("click", startDownload);

        initDates();
        initAirports();
    </script>
</body>
</html>
